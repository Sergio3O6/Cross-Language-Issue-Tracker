# ============================================================================
# Test-only configuration.
# ============================================================================
# The @DataJpaTest slice replaces the datasource with an in-memory H2 database, so
# repository tests run without a live MySQL server. We override the production dialect
# and disable ddl-auto=update noise here so H2 is used cleanly.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
