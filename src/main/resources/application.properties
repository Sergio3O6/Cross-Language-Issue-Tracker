spring.application.name=issue-tracker

# ---- MySQL connection ------------------------------------------------------
# Adjust the database name / credentials to match your local MySQL instance.
# `createDatabaseIfNotExist=true` lets Hibernate create the schema on first run.
spring.datasource.url=jdbc:mysql://localhost:3306/issuetracker?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate -------------------------------------------------------
# ddl-auto=update : Hibernate creates/updates tables from the @Entity classes.
#   Convenient for development; use a migration tool (Flyway/Liquibase) in prod.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Log the generated SQL (handy while developing; turn off in production).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Web server ------------------------------------------------------------
server.port=8080
